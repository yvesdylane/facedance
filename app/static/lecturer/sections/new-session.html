<div>
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-xl font-bold text-gray-900">New Session</h1>
  </div>

  <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 max-w-lg">
    <form id="newSessionForm" onsubmit="return handleStartSession(event)" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Specialty</label>
        <select required class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
          <option value="">Select specialty...</option>
          <option>Software Engineering</option>
          <option>Network & Security</option>
          <option>Accounting</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Period</label>
        <select required class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
          <option value="">Select period...</option>
          <option>08:00 – 10:00</option>
          <option>10:00 – 12:00</option>
          <option>13:00 – 15:00</option>
          <option>15:00 – 17:00</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
        <input type="date" required class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none" />
      </div>
      <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-2.5 rounded-lg text-sm transition flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        Start Session
      </button>
    </form>
  </div>
</div>

<script>
  const today = new Date().toISOString().split('T')[0]
  document.querySelector('#newSessionForm input[type="date"]').value = today

  function handleStartSession(e) {
    e.preventDefault()
    document.getElementById('new-session').click()
    APP.loadSection('live-feed')
  }
</script>
