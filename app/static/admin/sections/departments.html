<div>
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-xl font-bold text-gray-900">Departments</h1>
    <button onclick="document.getElementById('deptModal').classList.remove('hidden')" class="flex items-center gap-2 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Add Department
    </button>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-4" id="dept-list">
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold text-gray-900">Computer Science</h3>
        <span class="text-xs text-gray-400">HOD: John Doe</span>
      </div>
      <div class="space-y-2">
        <div class="flex items-center justify-between text-sm py-1.5 px-3 bg-gray-50 rounded-lg">
          <span>Software Engineering</span>
          <span class="text-xs text-gray-400">12 students</span>
        </div>
        <div class="flex items-center justify-between text-sm py-1.5 px-3 bg-gray-50 rounded-lg">
          <span>Network & Security</span>
          <span class="text-xs text-gray-400">8 students</span>
        </div>
      </div>
      <button onclick="document.getElementById('specModal').classList.remove('hidden')" class="mt-3 flex items-center gap-1 text-sm text-primary-600 hover:text-primary-700 font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add Specialty
      </button>
    </div>
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-semibold text-gray-900">Business</h3>
        <span class="text-xs text-gray-400">HOD: Jane Smith</span>
      </div>
      <div class="space-y-2">
        <div class="flex items-center justify-between text-sm py-1.5 px-3 bg-gray-50 rounded-lg">
          <span>Accounting</span>
          <span class="text-xs text-gray-400">15 students</span>
        </div>
      </div>
      <button onclick="document.getElementById('specModal').classList.remove('hidden')" class="mt-3 flex items-center gap-1 text-sm text-primary-600 hover:text-primary-700 font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add Specialty
      </button>
    </div>
  </div>

  <div id="deptModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50" onclick="document.getElementById('deptModal').classList.add('hidden')"></div>
    <div class="relative max-w-md mx-auto mt-24 p-4">
      <div class="bg-white rounded-2xl shadow-xl p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">New Department</h2>
        <form onsubmit="event.preventDefault(); document.getElementById('deptModal').classList.add('hidden')" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Department Name</label>
            <input type="text" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Head of Department</label>
            <select class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
              <option value="">—</option>
            </select>
          </div>
          <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-2 rounded-lg text-sm transition">Create</button>
        </form>
      </div>
    </div>
  </div>

  <div id="specModal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/50" onclick="document.getElementById('specModal').classList.add('hidden')"></div>
    <div class="relative max-w-md mx-auto mt-24 p-4">
      <div class="bg-white rounded-2xl shadow-xl p-6">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">New Specialty</h2>
        <form onsubmit="event.preventDefault(); document.getElementById('specModal').classList.add('hidden')" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Specialty Name</label>
            <input type="text" required class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Department</label>
            <select class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
              <option>Computer Science</option>
              <option>Business</option>
            </select>
          </div>
          <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-2 rounded-lg text-sm transition">Create</button>
        </form>
      </div>
    </div>
  </div>
</div>
