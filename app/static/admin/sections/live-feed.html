<div>
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-xl font-bold text-gray-900">Live Feed</h1>
    <span id="session-status" class="px-3 py-1 bg-gray-100 text-gray-500 text-xs font-medium rounded-full">Inactive</span>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2">
      <div class="bg-black rounded-xl overflow-hidden shadow-sm aspect-video relative">
        <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
        <div id="video-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-white">
          <svg class="w-12 h-12 mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          <p class="text-sm opacity-70">Camera feed will appear here</p>
        </div>
      </div>
      <div class="flex items-center gap-3 mt-4">
        <select id="feed-specialty" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
          <option value="">Select specialty...</option>
          <option>Software Engineering</option>
          <option>Network & Security</option>
          <option>Accounting</option>
        </select>
        <select id="feed-period" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
          <option value="">Select period...</option>
          <option>08:00 – 10:00</option>
          <option>10:00 – 12:00</option>
          <option>13:00 – 15:00</option>
          <option>15:00 – 17:00</option>
        </select>
        <button id="startStopBtn" onclick="toggleSession()" class="px-5 py-2 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-lg transition flex items-center gap-2">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          Start
        </button>
      </div>
    </div>

    <div>
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 h-full">
        <h2 class="text-sm font-semibold text-gray-700 mb-3">Detected Students</h2>
        <div class="space-y-2" id="detected-list">
          <div class="text-center text-gray-400 text-sm py-8">No students detected yet</div>
        </div>
        <div class="mt-4 pt-4 border-t border-gray-100">
          <div class="flex items-center justify-between text-sm">
            <span class="text-gray-500">Present:</span>
            <span class="font-semibold text-gray-900" id="present-count">0</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let stream = null
  let sessionActive = false

  async function toggleSession() {
    const btn = document.getElementById('startStopBtn')
    const status = document.getElementById('session-status')

    if (!sessionActive) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true })
        const video = document.getElementById('video')
        video.srcObject = stream
        document.getElementById('video-placeholder').classList.add('hidden')
        sessionActive = true
        btn.innerHTML = '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Stop'
        btn.classList.remove('bg-primary-600', 'hover:bg-primary-700')
        btn.classList.add('bg-red-600', 'hover:bg-red-700')
        status.textContent = 'Active'
        status.className = 'px-3 py-1 bg-green-100 text-green-700 text-xs font-medium rounded-full'
      } catch {
        alert('Could not access camera')
      }
    } else {
      if (stream) stream.getTracks().forEach(t => t.stop())
      document.getElementById('video').srcObject = null
      document.getElementById('video-placeholder').classList.remove('hidden')
      sessionActive = false
      btn.innerHTML = '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Start'
      btn.classList.remove('bg-red-600', 'hover:bg-red-700')
      btn.classList.add('bg-primary-600', 'hover:bg-primary-700')
      status.textContent = 'Inactive'
      status.className = 'px-3 py-1 bg-gray-100 text-gray-500 text-xs font-medium rounded-full'
    }
  }
</script>
