<div>
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-xl font-bold text-gray-900">Sessions</h1>
    <div class="flex items-center gap-2">
      <input type="date" id="session-date-filter" class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none" />
    </div>
  </div>

  <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 text-left text-gray-500 font-medium">
            <th class="px-4 py-3">Date</th>
            <th class="px-4 py-3">Specialty</th>
            <th class="px-4 py-3">Period</th>
            <th class="px-4 py-3">Lecturer</th>
            <th class="px-4 py-3 text-center">Present</th>
            <th class="px-4 py-3 text-center">Absent</th>
            <th class="px-4 py-3 text-center">Excused</th>
            <th class="px-4 py-3 text-right">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100" id="sessions-table-body">
          <tr><td colspan="8" class="px-4 py-8 text-center text-gray-400">No sessions found</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const today = new Date().toISOString().split('T')[0]
  document.getElementById('session-date-filter').value = today
</script>
