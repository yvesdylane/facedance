<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartTend — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' } }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="min-h-screen bg-gray-50">
  <div id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 flex flex-col transform -translate-x-full lg:translate-x-0 transition-transform duration-200">
    <div class="flex items-center gap-3 px-5 h-16 border-b border-slate-700">
      <div class="w-8 h-8 bg-primary-500 rounded-lg flex items-center justify-center text-white font-bold text-sm">S</div>
      <span class="text-white font-semibold">SmartTend</span>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto sidebar-scroll">
      <a href="#" class="nav-item active" data-section="stats" onclick="APP.loadSection('stats')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
        Dashboard
      </a>
      <a href="#" class="nav-item" data-section="users" onclick="APP.loadSection('users')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        Users
      </a>
      <a href="#" class="nav-item" data-section="departments" onclick="APP.loadSection('departments')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
        Departments
      </a>
      <a href="#" class="nav-item" data-section="sessions" onclick="APP.loadSection('sessions')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Sessions
      </a>
      <a href="#" class="nav-item" data-section="live-feed" onclick="APP.loadSection('live-feed')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        Live Feed
      </a>
    </nav>
    <div class="px-4 py-4 border-t border-slate-700">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-slate-600 flex items-center justify-center text-xs text-white font-medium" id="user-avatar">A</div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-white truncate" id="user-info-name">Admin</p>
          <p class="text-xs text-slate-400 truncate" id="user-info-email">admin@smarttend.com</p>
        </div>
        <button onclick="APP.logout()" class="text-slate-400 hover:text-white transition" title="Sign out">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="backdrop" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="APP.toggleSidebar()"></div>

  <div class="lg:ml-64 flex flex-col min-h-screen">
    <header class="h-16 bg-white border-b border-gray-200 flex items-center px-4 lg:px-6 sticky top-0 z-30">
      <button onclick="APP.toggleSidebar()" class="lg:hidden p-2 -ml-2 rounded-lg hover:bg-gray-100 transition">
        <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="ml-auto flex items-center gap-3">
        <span class="text-sm text-gray-500 hidden sm:block" id="user-name">Admin</span>
        <span class="px-2 py-0.5 bg-primary-100 text-primary-700 text-xs font-medium rounded-full">Admin</span>
      </div>
    </header>
    <main id="content" class="flex-1 p-4 lg:p-6">
      <div class="flex items-center justify-center h-64 text-gray-400">
        <p>Loading...</p>
      </div>
    </main>
  </div>

  <script src="/static/js/app.js"></script>
  <script>APP.init('admin')</script>
</body>
</html>
