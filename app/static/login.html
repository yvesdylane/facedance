<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartTend — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' } }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-primary-600 rounded-xl mb-4">
        <span class="text-2xl font-bold text-white">S</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">SmartTend</h1>
      <p class="text-sm text-gray-500 mt-1">Sign in to your account</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" required
            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
            placeholder="you@example.com" />
        </div>
        <div class="mb-6">
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" required
            class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
            placeholder="••••••••" />
        </div>
        <button type="submit" id="loginBtn"
          class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-2.5 rounded-lg text-sm transition flex items-center justify-center gap-2">
          <span id="btnText">Sign in</span>
          <svg id="btnSpinner" class="hidden animate-spin h-4 w-4" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" />
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
          </svg>
        </button>
        <div id="errorMsg" class="mt-3 text-sm text-red-600 text-center hidden"></div>
      </form>
    </div>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault()
      const btn = document.getElementById('loginBtn')
      const text = document.getElementById('btnText')
      const spinner = document.getElementById('btnSpinner')
      const error = document.getElementById('errorMsg')
      btn.disabled = true
      text.textContent = 'Signing in...'
      spinner.classList.remove('hidden')
      error.classList.add('hidden')

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value }),
        })
        const data = await res.json()
        if (!res.ok) {
          error.textContent = data.detail || 'Invalid credentials'
          error.classList.remove('hidden')
          return
        }
        localStorage.setItem('st_token', data.access_token)
        localStorage.setItem('st_user', JSON.stringify(data.user))

        if (data.must_enroll) {
          window.location.href = '/enrollment.html'
        } else {
          const page = { admin: '/static/admin/page.html', lecturer: '/static/lecturer/page.html', student: '/static/student/page.html' }[data.user.role]
          window.location.href = page
        }
      } catch {
        error.textContent = 'Connection error. Please try again.'
        error.classList.remove('hidden')
      } finally {
        btn.disabled = false
        text.textContent = 'Sign in'
        spinner.classList.add('hidden')
      }
    }
  </script>
</body>
</html>
