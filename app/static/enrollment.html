<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartTend — Enrollment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' } }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="min-h-screen bg-gray-50">
  <div class="max-w-2xl mx-auto px-4 py-8">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 bg-primary-600 rounded-xl mb-3">
        <span class="text-xl font-bold text-white">S</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Welcome to SmartTend</h1>
      <p class="text-sm text-gray-500 mt-1">Set up your profile to get started</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sm:p-8">
      <form id="enrollForm" onsubmit="return handleEnroll(event)">
        <div class="mb-8">
          <div class="flex items-center justify-between mb-2">
            <h2 class="text-sm font-semibold text-gray-700">Step 1 of 2 — Set your password</h2>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label for="password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
              <input type="password" id="password" required minlength="6"
                class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                placeholder="••••••••" />
            </div>
            <div>
              <label for="confirm" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
              <input type="password" id="confirm" required minlength="6"
                class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none transition"
                placeholder="••••••••" />
            </div>
          </div>
          <p id="passError" class="mt-2 text-sm text-red-600 hidden">Passwords do not match</p>
        </div>

        <div class="mb-8">
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-sm font-semibold text-gray-700">Step 2 of 2 — Upload your photos</h2>
          </div>
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Profile Picture</label>
            <div class="flex items-center gap-4">
              <div id="profilePreview" class="w-16 h-16 rounded-full bg-gray-100 border-2 border-dashed border-gray-300 flex items-center justify-center overflow-hidden flex-shrink-0">
                <svg class="w-6 h-6 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              </div>
              <label class="cursor-pointer px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition">
                Choose file
                <input type="file" id="profilePic" accept="image/*" class="hidden" onchange="previewProfile(event)" />
              </label>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Face Images <span class="text-gray-400 font-normal">(5 photos, different angles)</span></label>
            <div class="grid grid-cols-2 sm:grid-cols-5 gap-3">
              <div class="face-upload" data-index="0" onclick="document.getElementById('face0').click()">
                <input type="file" id="face0" accept="image/*" class="hidden" onchange="previewFace(event, 0)" />
                <div class="aspect-square rounded-lg border-2 border-dashed border-gray-300 bg-gray-50 flex flex-col items-center justify-center text-gray-400 hover:border-primary-400 hover:bg-primary-50 transition cursor-pointer">
                  <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                  <span class="text-xs font-medium">Angle 1</span>
                </div>
              </div>
              <div class="face-upload" data-index="1" onclick="document.getElementById('face1').click()">
                <input type="file" id="face1" accept="image/*" class="hidden" onchange="previewFace(event, 1)" />
                <div class="aspect-square rounded-lg border-2 border-dashed border-gray-300 bg-gray-50 flex flex-col items-center justify-center text-gray-400 hover:border-primary-400 hover:bg-primary-50 transition cursor-pointer">
                  <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                  <span class="text-xs font-medium">Angle 2</span>
                </div>
              </div>
              <div class="face-upload" data-index="2" onclick="document.getElementById('face2').click()">
                <input type="file" id="face2" accept="image/*" class="hidden" onchange="previewFace(event, 2)" />
                <div class="aspect-square rounded-lg border-2 border-dashed border-gray-300 bg-gray-50 flex flex-col items-center justify-center text-gray-400 hover:border-primary-400 hover:bg-primary-50 transition cursor-pointer">
                  <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                  <span class="text-xs font-medium">Angle 3</span>
                </div>
              </div>
              <div class="face-upload" data-index="3" onclick="document.getElementById('face3').click()">
                <input type="file" id="face3" accept="image/*" class="hidden" onchange="previewFace(event, 3)" />
                <div class="aspect-square rounded-lg border-2 border-dashed border-gray-300 bg-gray-50 flex flex-col items-center justify-center text-gray-400 hover:border-primary-400 hover:bg-primary-50 transition cursor-pointer">
                  <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                  <span class="text-xs font-medium">Angle 4</span>
                </div>
              </div>
              <div class="face-upload" data-index="4" onclick="document.getElementById('face4').click()">
                <input type="file" id="face4" accept="image/*" class="hidden" onchange="previewFace(event, 4)" />
                <div class="aspect-square rounded-lg border-2 border-dashed border-gray-300 bg-gray-50 flex flex-col items-center justify-center text-gray-400 hover:border-primary-400 hover:bg-primary-50 transition cursor-pointer">
                  <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                  <span class="text-xs font-medium">Angle 5</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <button type="submit" id="enrollBtn"
          class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-2.5 rounded-lg text-sm transition flex items-center justify-center gap-2">
          <span id="enrollText">Complete Setup</span>
          <svg id="enrollSpinner" class="hidden animate-spin h-4 w-4" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" />
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
          </svg>
        </button>
        <div id="enrollError" class="mt-3 text-sm text-red-600 text-center hidden"></div>
      </form>
    </div>
  </div>

  <script>
    let facePreviews = Array(5).fill(null)

    function previewProfile(e) {
      const file = e.target.files[0]
      if (!file) return
      const reader = new FileReader()
      reader.onload = (ev) => {
        const container = document.getElementById('profilePreview')
        container.innerHTML = `<img src="${ev.target.result}" class="w-full h-full object-cover" />`
        container.classList.remove('border-dashed', 'border-gray-300', 'bg-gray-100')
      }
      reader.readAsDataURL(file)
    }

    function previewFace(e, index) {
      const file = e.target.files[0]
      if (!file) return
      facePreviews[index] = file
      const reader = new FileReader()
      reader.onload = (ev) => {
        const container = document.querySelector(`.face-upload[data-index="${index}"] > div`)
        container.innerHTML = `<img src="${ev.target.result}" class="w-full h-full object-cover rounded-lg" />`
        container.classList.remove('border-dashed', 'border-gray-300', 'bg-gray-50', 'hover:border-primary-400', 'hover:bg-primary-50', 'cursor-pointer')
      }
      reader.readAsDataURL(file)
    }

    async function handleEnroll(e) {
      e.preventDefault()
      const pass = document.getElementById('password').value
      const confirm = document.getElementById('confirm').value
      const passError = document.getElementById('passError')

      if (pass !== confirm) {
        passError.classList.remove('hidden')
        return
      }
      passError.classList.add('hidden')

      const profilePic = document.getElementById('profilePic').files[0]
      if (!profilePic) { showError('Please select a profile picture'); return }
      const faceFiles = facePreviews.filter(f => f !== null)
      if (faceFiles.length < 5) { showError('Please upload all 5 face images'); return }

      const btn = document.getElementById('enrollBtn')
      const text = document.getElementById('enrollText')
      const spinner = document.getElementById('enrollSpinner')
      btn.disabled = true
      text.textContent = 'Processing...'
      spinner.classList.remove('hidden')

      const fd = new FormData()
      fd.append('password', pass)
      fd.append('profile_pic', profilePic)
      faceFiles.forEach(f => fd.append('face_images', f))

      try {
        const token = localStorage.getItem('st_token')
        const res = await fetch('/enrollment', {
          method: 'POST',
          headers: token ? { 'Authorization': `Bearer ${token}` } : {},
          body: fd,
        })
        const data = await res.json()
        if (!res.ok) { showError(data.detail || 'Enrollment failed'); return }

        localStorage.setItem('st_user', JSON.stringify(data.user))
        const page = { admin: '/static/admin/page.html', lecturer: '/static/lecturer/page.html', student: '/static/student/page.html' }[data.user.role]
        window.location.href = page
      } catch {
        showError('Connection error. Please try again.')
      } finally {
        btn.disabled = false
        text.textContent = 'Complete Setup'
        spinner.classList.add('hidden')
      }
    }

    function showError(msg) {
      const el = document.getElementById('enrollError')
      el.textContent = msg
      el.classList.remove('hidden')
    }
  </script>
</body>
</html>
